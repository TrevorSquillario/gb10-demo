services:

  # ── Infrastructure ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - gb10-vision
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Capture ──────────────────────────────────────────────────────────────
  capture:
    build:
      context: .
      dockerfile: capture/Dockerfile
    restart: unless-stopped
    environment:
      #VIDEO_SOURCE: /videos/people2.mkv
      VIDEO_SOURCE: 0 # Webcam at /dev/video0
      CAPTURE_FPS:       "30"
      REDIS_URL:         "redis://redis:6379"
      LOG_JSON:          "1"
    devices:
      - /dev/video0:/dev/video0
    volumes:
      - ~/gb10/videos:/videos
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gb10-vision

  # ── YOLO face detection + tracking ───────────────────────────────────────
  yolo:
    #profiles: [yolo]
    build:
      context: .
      dockerfile: yolo/Dockerfile
    restart: unless-stopped
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      MODEL_PATH:   /app/models/yolov12n-face.pt
      CONF:         "0.3"
      IOU:          "0.3"
      MAX_DET:      "50"
      SHOW_FPS:     "1"
      SHOW_STATS:   "1"
      REDIS_URL:    "redis://redis:6379"
      LOG_JSON:     "1"
      BG_IMAGE_PATH: "/app/images/background01.jpg"
    volumes:
      - ~/gb10/images:/app/images
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gb10-vision

  mask:
    #profiles: [mask]
    build:
      context: .
      dockerfile: mask/Dockerfile
    restart: unless-stopped
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      BG_IMAGE_PATH: "/app/images/background01.jpg"
      REDIS_URL:     "redis://redis:6379"
      LOG_JSON:      "1"
    volumes:
      - ~/gb10/images:/app/images
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gb10-vision

  # ── DWpose skeleton detection (optional — enable with: --profile dwpose) ─
  dwpose: 
    #profiles: [dwpose]
    build:
      context: .
      dockerfile: dwpose/Dockerfile
    restart: unless-stopped
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      TRT_DET_ENGINE:  /app/models/yolox_l.engine
      TRT_POSE_ENGINE: /app/models/dw-ll_ucoco_384.engine
      SHOW_FPS:        "1"
      REDIS_URL:       "redis://redis:6379"
      LOG_JSON:        "1"
    volumes:
      - ~/gb10/models/comfyui/tensorrt/dwpose:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gb10-vision

  # ── Depth Anything TRT (optional — enable with: --profile depth) ─────────
  depth:
    #profiles: [depth]
    build:
      context: .
      dockerfile: depth/Dockerfile
    restart: unless-stopped
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      DEPTH_ENGINE_PATH: /app/models/v2_depth_anything_vitl-fp16.engine
      DEPTH_GRAYSCALE:   "0"
      SHOW_FPS:          "1"
      REDIS_URL:         "redis://redis:6379"
      LOG_JSON:          "1"
      #LOG_LEVEL: "DEBUG"
      DEPTH_CMAP: "magma_r"
    volumes:
      #- ~/gb10/models/comfyui/tensorrt/depth-anything:/app/models:ro
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gb10-vision

  # ── DeepFace (optional — enable with: --profile deepface) ────────────────
  deepface:
    #profiles: [deepface]
    build:
      context: .
      dockerfile: deepface/Dockerfile
    restart: unless-stopped
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      REDIS_URL:            "redis://redis:6379"
      LOG_JSON:             "1"
    volumes:
      - ~/gb10/models/deepface:/root/.deepface/weights
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gb10-vision

  # ── VLM (optional — enable with: --profile vlm) ───────────────────────────
  vlm:
    #profiles: [vlm]
    build:
      context: .
      dockerfile: vlm/Dockerfile
    restart: unless-stopped
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      #VLM_MODEL_ID:       "Qwen/Qwen2.5-VL-7B-Instruct"
      #VLM_MODEL_ID:       "Qwen/Qwen3-VL-8B-Instruct"
      VLM_MODEL_ID:       "Qwen/Qwen3-VL-2B-Instruct"
      VLM_INTERVAL:       "30"
      REDIS_URL:          "redis://redis:6379"
      LOG_JSON:           "1"
      #HF_HUB_OFFLINE: "1"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gb10-vision

  # ── Stable Diffusion XL Turbo + ControlNet (optional) ──────────────────────
  stablediffusion:
    profiles: [stablediffusion]
    build:
      context: .
      dockerfile: stablediffusion/Dockerfile
    restart: unless-stopped
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      SD_PROMPT:            "A delicate, glowing tracing of a standing person, iridescent neon light, floating on a pitch-black void, cinematic lighting, dramatic contrast, spiritual energy, photorealistic light Bloom, exquisite detail."
      SD_NEGATIVE_PROMPT:   "background elements, scenery, buildings, text, watermark, blurry, noise, background light, low quality"
      SD_WIDTH:             "1344"
      SD_HEIGHT:            "768"
      SD_SHOW_SIDE_BY_SIDE: "0"
      SHOW_FPS:             "1"
      REDIS_URL:            "redis://redis:6379"
      LOG_JSON:             "1"
      LOG_LEVEL:            "DEBUG"
      #HF_HUB_OFFLINE:       "1"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ~/.cache/torch_cache:/tmp/torchinductor_root
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gb10-vision

  streamdiffusion:
    profiles: [streamdiffusion]
    build: 
      context: .
      dockerfile: streamdiffusion/Dockerfile
    container_name: streamdiffusion
    environment:
      SD_PROMPT: "macro photography, bioluminescent mushrooms, glowing fungi forest, gnome and fairies walking about, neon cyan and magenta color palette, intricate gill detail, spotted mushroom caps, ethereal glow, dark alien terrain, gnarled roots, magical atmosphere"
      SD_NEGATIVE_PROMPT: "watermark, text, signature, blurry, low resolution, distorted, grainy, bright daylight, sun, human, animal, boring colors, flat lighting"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ~/gb10/models/tensorrt/streamdiffusion:/app/models
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gb10-vision
    #command:  ["/usr/bin/tail", "-f", "/dev/null"]
    #command:  ["python3", "streamdiffusion_txt2img.py"]

  # ── SAM2 person segmentation (optional — enable with: --profile sam2) ────
  sam2:
    profiles: [sam2]
    build:
      context: .
      dockerfile: sam2/Dockerfile
    restart: unless-stopped
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      SAM2_MODEL_ID:  "facebook/sam2.1-hiera-small"
      MASK_MODE:      "colour"
      MASK_ALPHA:     "0.6"
      SKIP_FRAMES:    "1"
      SHOW_FPS:       "1"
      REDIS_URL:      "redis://redis:6379"
      LOG_JSON:       "1"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gb10-vision

  # ── API gateway ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      REDIS_URL:      "redis://redis:6379"
      MJPEG_QUALITY:  "75"
      LOG_JSON:       "1"
    volumes:
      - ./api/src/templates/index.html:/app/templates/index.html:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gb10-vision
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  gb10-vision:
    driver: bridge
